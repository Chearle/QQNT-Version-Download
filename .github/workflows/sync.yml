name: QQ版本自动监控
on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

# 强制 Node.js 24 + 仓库写入权限
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: 设置Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 运行监控脚本
        run: python main.py

      # 原生Git提交（无Node.js依赖，零警告零报错）
      - name: 自动提交更新
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add download_links.json
          git commit -m "✅ 自动更新QQ最新版本下载地址" || exit 0
          git push
