name: QQ版本自动监控
on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: 设置Python环境
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 运行监控脚本
        run: python main.py

      # 关键修复：无文件修改时跳过提交，不报错
      - name: 提交并推送更新
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email actions@github.com
          git add download_links.json
          git commit -m "✅ 自动同步QQ最新版本下载地址" || true
          git push
