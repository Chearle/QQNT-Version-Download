name: QQ版本自动监控
on:
  schedule:
    - cron: "*/10 * * * *"  # 每10分钟自动运行一次
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 运行脚本
        run: |
          pip install requests
          python main.py

      - name: 提交更新（永不报错）
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add versions/*.json
          git commit -m "✅ 自动更新版本" || true
          git push
