name: QQ版本自动监控
on:
  schedule:
    - cron: "*/15 * * * *"  # 每15分钟自动运行
  workflow_dispatch:        # 手动运行
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 运行脚本生成JSON
        run: |
          pip install requests
          python main.py

      # ✅ 官方提交工具，永不报错！！！
      - name: 自动提交更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "✅ 自动更新QQ版本信息"
          file_pattern: "versions/*.json"
