name: QQ版本自动监控
on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: 设置Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 运行脚本（强制写入版本）
        run: python main.py

      # 调试：查看文件是否被修改
      - name: 查看文件状态
        run: |
          ls -lh
          cat download_links.json

      # 提交（无修改也不报错，有修改必提交）
      - name: 提交更新
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add download_links.json
          git commit -m "✅ 强制初始化QQ版本下载地址" || true
          git push
