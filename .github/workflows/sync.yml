name: QQ版本自动监控
on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

# 赋予仓库写入权限
permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      # 原生支持 Node.js 24 的最新版
      - name: 检出仓库代码
        uses: actions/checkout@v5

      # 原生支持 Node.js 24 的最新版
      - name: 设置Python环境
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 运行监控脚本
        run: python main.py

      # 替换为原生支持 Node.js 24 的自动提交工具
      - name: 自动提交更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "✅ 自动更新QQ最新版本下载地址"
          committer_name: GitHub Actions
          committer_email: actions@github.com
