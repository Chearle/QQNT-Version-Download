name: QQ版本自动监控
on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

# 强制启用 Node.js 24，彻底消除弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 赋予仓库写入权限
permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4.2.2

      - name: 设置Python环境
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 运行监控脚本
        run: python main.py

      - name: 提交并推送更新
        uses: EndBug/add-and-commit@v9.1.4
        with:
          message: "✅ 自动更新QQ最新版本下载地址"
          committer_name: GitHub Actions
          committer_email: actions@github.com
